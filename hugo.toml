baseURL = 'https://theoabel.com/'
locale = 'en-US'
title = 'zeishr'
theme = 'retro-term'
copyright = '© Théo Abel'
summaryLength = 24
enableRobotsTXT = true

[pagination]
  pagerSize = 12

[taxonomies]
  tag = 'tags'
  category = 'categories'
  series = 'series'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Writeups'
    pageRef = '/writeups'
    weight = 30

  [[menus.main]]
    name = 'Projects'
    pageRef = '/projects'
    weight = 40

  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 50

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 60

  [[menus.main]]
    name = 'Categories'
    pageRef = '/categories'
    weight = 70

[markup]
  [markup.highlight]
    noClasses = false

[module]
  [module.hugoVersion]
    extended = true
    min = '0.162.1'

[params]
  author = 'Théo Abel'
  description = 'Tooling for computer security, OS internals, binary analysis, reverse engineering, game security research, and fuzzing.'

  [params.home]
    eyebrow = 'cybersecurity and software notes'
    title = 'Curiosity below the surface'
    intro = 'Research notes, writeups, and project logs around systems security, binary analysis, instrumentation, reverse engineering, and fuzzing.'
    primaryActionLabel = 'read posts'
    primaryActionURL = '/posts/'
    secondaryActionLabel = 'view projects'
    secondaryActionURL = '/projects/'
